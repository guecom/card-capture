<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#111827">
<title>명함 캡처</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root {
    --bg: #f6f7f9; --card: #ffffff; --text: #111827; --muted: #6b7280;
    --line: #e5e7eb; --accent: #4f46e5; --accent-text: #ffffff;
    --ok: #059669; --warn: #d97706; --err: #dc2626;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0b0f17; --card: #151b26; --text: #f3f4f6; --muted: #9ca3af;
      --line: #273042; --accent: #6366f1; --ok: #34d399; --warn: #fbbf24; --err: #f87171;
    }
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
    background: var(--bg); color: var(--text);
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  .wrap { max-width: 480px; margin: 0 auto; padding: 16px; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 4px 2px 14px; }
  header h1 { font-size: 20px; font-weight: 700; }
  .chip {
    font-size: 13px; color: var(--muted); background: var(--card); border: 1px solid var(--line);
    border-radius: 999px; padding: 6px 12px; cursor: pointer;
  }
  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 16px;
    padding: 16px; margin-bottom: 14px;
  }
  .shot {
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
    width: 100%; min-height: 128px; border: 2px dashed var(--line); border-radius: 14px;
    background: none; color: var(--muted); font-size: 15px; cursor: pointer; padding: 10px;
  }
  .shot.main { min-height: 168px; border-color: var(--accent); color: var(--accent); font-weight: 600; }
  .shot .big { font-size: 34px; line-height: 1; }
  .shot img { max-width: 100%; max-height: 180px; border-radius: 10px; }
  .shot.filled { border-style: solid; min-height: 0; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
  .field { margin-top: 12px; }
  .field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 5px; }
  .field input, .field textarea {
    width: 100%; font-size: 16px; color: var(--text); background: var(--bg);
    border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; font-family: inherit;
  }
  .field textarea { resize: none; height: 64px; }
  .btn {
    width: 100%; border: 0; border-radius: 12px; padding: 15px; font-size: 17px; font-weight: 700;
    background: var(--accent); color: var(--accent-text); cursor: pointer; margin-top: 14px;
  }
  .btn:disabled { opacity: .4; }
  .hint { font-size: 12.5px; color: var(--muted); text-align: center; margin-top: 10px; line-height: 1.5; }
  .item { display: flex; align-items: center; gap: 12px; padding: 10px 2px; border-bottom: 1px solid var(--line); }
  .item:last-child { border-bottom: 0; }
  .item img { width: 52px; height: 36px; object-fit: cover; border-radius: 6px; background: var(--line); }
  .item .info { flex: 1; min-width: 0; }
  .item .t1 { font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .item .t2 { font-size: 12px; color: var(--muted); }
  .st { font-size: 12px; font-weight: 600; border-radius: 999px; padding: 4px 10px; white-space: nowrap; }
  .st.sent { color: var(--ok); background: color-mix(in srgb, var(--ok) 12%, transparent); }
  .st.queued { color: var(--warn); background: color-mix(in srgb, var(--warn) 12%, transparent); }
  .st.failed { color: var(--err); background: color-mix(in srgb, var(--err) 12%, transparent); cursor: pointer; }
  h2 { font-size: 15px; color: var(--muted); font-weight: 600; margin: 4px 2px 8px; }
  .toast {
    position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%);
    background: var(--text); color: var(--bg); font-size: 14px; border-radius: 999px;
    padding: 10px 18px; opacity: 0; transition: opacity .25s; pointer-events: none; max-width: 90%;
    z-index: 40; text-align: center;
  }
  .toast.show { opacity: 1; }
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.5); display: none;
    align-items: center; justify-content: center; padding: 24px; z-index: 10;
  }
  .overlay.show { display: flex; }
  .overlay .card { width: 100%; max-width: 360px; margin: 0; }
  .overlay h3 { font-size: 17px; margin-bottom: 6px; }
  .overlay p { font-size: 13.5px; color: var(--muted); line-height: 1.5; }
  .banner { border-left: 4px solid var(--warn); border-radius: 10px; }
  .banner b { font-size: 15px; }
  .banner p { font-size: 13.5px; color: var(--muted); margin-top: 6px; line-height: 1.55; }
  input[type=file] { display: none; }

  /* ── 카메라 화면 ── */
  .cam { position: fixed; inset: 0; background: #000; display: none; z-index: 30; }
  .cam.show { display: block; }
  .cam video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .cam canvas.ov { position: absolute; inset: 0; width: 100%; height: 100%; }
  .cam .top {
    position: absolute; top: 0; left: 0; right: 0; display: flex; align-items: center;
    justify-content: space-between; padding: calc(10px + env(safe-area-inset-top)) 14px 10px;
    color: #fff; z-index: 2; background: linear-gradient(rgba(0,0,0,.45), transparent);
  }
  .cam .top .side { font-size: 15px; font-weight: 700; }
  .cam .top .cvst { font-size: 11.5px; opacity: .8; margin-top: 2px; }
  .cam .icon {
    background: rgba(0,0,0,.35); color: #fff; border: 0; border-radius: 999px;
    width: 42px; height: 42px; font-size: 19px; cursor: pointer;
  }
  .cam .icon.on { background: rgba(255,255,255,.9); color: #111; }
  .cam .bottom {
    position: absolute; left: 0; right: 0; bottom: 0; z-index: 2; text-align: center;
    padding: 14px 16px calc(20px + env(safe-area-inset-bottom));
    background: linear-gradient(transparent, rgba(0,0,0,.55));
  }
  .cam .shutter {
    width: 74px; height: 74px; border-radius: 50%; border: 5px solid #fff;
    background: rgba(255,255,255,.25); cursor: pointer; vertical-align: middle;
  }
  .cam .shutter:active { background: #fff; }
  .cam .skip {
    position: absolute; right: 20px; bottom: calc(38px + env(safe-area-inset-bottom));
    background: none; border: 0; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; z-index: 3;
  }
  .cam .fb { display: block; margin: 12px auto 0; background: none; border: 0; color: rgba(255,255,255,.75); font-size: 12.5px; cursor: pointer; }
  .cam .guidehint { color: rgba(255,255,255,.85); font-size: 13px; margin-bottom: 12px; }
  #camChoiceThumb { width: 110px; border-radius: 8px; display: block; margin: 0 auto 12px; border: 2px solid rgba(255,255,255,.7); }
  .cam .choiceRow { display: flex; gap: 10px; max-width: 340px; margin: 0 auto; }
  .cam .cbtn { flex: 1; border: 0; border-radius: 12px; padding: 14px 10px; font-size: 15px; font-weight: 700; background: rgba(255,255,255,.18); color: #fff; cursor: pointer; }
  .cam .cbtn.primary { background: #4f46e5; }
  .dimg { width: 100%; border-radius: 10px; background: var(--line); min-height: 64px; object-fit: cover; display: block; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>📇 명함 캡처</h1>
    <button class="chip" id="nameChip" type="button">…</button>
  </header>

  <div class="card banner" id="setupBanner" style="display:none">
    <b>링크 설정이 필요해요</b>
    <p id="setupMsg"></p>
  </div>

  <div class="card" id="captureCard">
    <button class="shot main" id="frontBtn" type="button">
      <span class="big">📷</span><span id="frontLabel">명함 앞면 촬영</span>
    </button>
    <div class="row2">
      <button class="shot" id="backBtn" type="button" style="display:none">
        <span>뒷면 추가 <small>(선택)</small></span>
      </button>
      <button class="shot" id="retakeBtn" type="button" style="display:none"><span>앞면 다시 찍기</span></button>
    </div>
    <input type="file" id="frontInput" accept="image/*" capture="environment">
    <input type="file" id="backInput" accept="image/*" capture="environment">

    <div class="field">
      <label for="eventInput">어디서 만났는지 (선택, 2시간 유지)</label>
      <input id="eventInput" placeholder="예: 2026 로보월드 전시회" autocomplete="off">
    </div>
    <div class="field">
      <label for="relKairenInput">Kairen과 이 사람과의 관계 (선택, 2시간 유지)</label>
      <input id="relKairenInput" placeholder="예: 잠재 고객 / 부품 공급사 담당자" autocomplete="off">
    </div>
    <div class="field">
      <label for="relSelfInput">나와 이 사람과의 관계 (선택, 2시간 유지)</label>
      <input id="relSelfInput" placeholder="예: 대학 선배 / 오늘 처음 인사" autocomplete="off">
    </div>
    <div class="field">
      <label for="noteInput">메모 (선택 — 키보드 마이크로 말해도 돼요)</label>
      <textarea id="noteInput" placeholder="예: 공장장님, 우리 부품에 관심 많으심"></textarea>
    </div>
    <button class="btn" id="sendBtn" type="button" disabled>완료</button>
    <p class="hint">사진만 찍으면 끝 — 정리와 인물 브리핑은 시스템이 나중에 해드려요.<br>전파가 약해도 대기열에 저장했다가 자동으로 다시 보내요. <span style="opacity:.55">v1.0</span></p>
  </div>

  <h2>최근 캡처</h2>
  <div class="card" id="recentCard"><div id="recentList" style="min-height:20px"></div></div>

  <h2 style="display:flex;justify-content:space-between;align-items:center">받은 명함 브리핑
    <button class="chip" id="briefRefresh" type="button">새로고침</button></h2>
  <div class="card" id="briefCard"><div id="briefList" style="min-height:20px"></div></div>
</div>

<!-- 카메라 화면 -->
<div class="cam" id="cam">
  <video id="camVideo" autoplay playsinline muted></video>
  <canvas class="ov" id="camOv"></canvas>
  <div class="top">
    <button class="icon" id="camClose" type="button">✕</button>
    <div style="text-align:center">
      <div class="side" id="camSide">명함 앞면</div>
      <div class="cvst" id="camCvSt"></div>
    </div>
    <button class="icon" id="camTorch" type="button" style="visibility:hidden">🔦</button>
  </div>
  <div class="bottom">
    <div class="guidehint" id="camHint">명함을 테두리 안에 맞추면 자동으로 잘라져요</div>
    <div id="camShotUI">
      <button class="shutter" id="camShot" type="button" aria-label="촬영"></button>
      <button class="fb" id="camNative" type="button">기본 카메라 앱으로 찍기</button>
    </div>
    <div id="camChoice" style="display:none">
      <img id="camChoiceThumb" alt="앞면 미리보기">
      <div class="choiceRow">
        <button class="cbtn primary" id="camGoBack2" type="button">뒷면도 찍기</button>
        <button class="cbtn" id="camDone" type="button">뒷면 없이 완료</button>
      </div>
    </div>
  </div>
</div>

<!-- 캡처 상세 (다시 찍기 / 정보 수정 / 재전송) -->
<div class="overlay" id="detailOverlay">
  <div class="card" style="max-height:88vh;overflow-y:auto">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <h3 style="margin:0">캡처 상세 <span id="dTime" style="font-size:12px;color:var(--muted);font-weight:400"></span></h3>
      <button class="chip" id="dClose" type="button">닫기</button>
    </div>
    <div class="row2" style="margin-top:0">
      <div style="text-align:center">
        <img id="dFrontImg" class="dimg" alt="앞면">
        <button class="chip" id="dRetakeFront" type="button" style="margin-top:6px">앞면 다시 찍기</button>
      </div>
      <div style="text-align:center">
        <img id="dBackImg" class="dimg" alt="뒷면">
        <button class="chip" id="dRetakeBack" type="button" style="margin-top:6px">뒷면 다시 찍기</button>
      </div>
    </div>
    <div class="field"><label for="dEvent">어디서 만났는지</label><input id="dEvent" autocomplete="off"></div>
    <div class="field"><label for="dRelSelf">나와 이 사람과의 관계</label><input id="dRelSelf" autocomplete="off"></div>
    <div class="field"><label for="dRelKairen">Kairen과 이 사람과의 관계</label><input id="dRelKairen" autocomplete="off"></div>
    <div class="field"><label for="dMemo">메모</label><textarea id="dMemo"></textarea></div>
    <button class="btn" id="dSave" type="button">저장하고 다시 보내기</button>
    <p class="hint" id="dStatus"></p>
  </div>
</div>

<!-- Person 프로필(.md) 뷰어 -->
<div class="overlay" id="docOverlay">
  <div class="card" style="max-height:90vh;overflow-y:auto;max-width:440px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <h3 style="margin:0" id="docTitle">프로필</h3>
      <button class="chip" id="docClose" type="button">닫기</button>
    </div>
    <div id="docBody" style="font-size:13.5px"></div>
  </div>
</div>

<div class="overlay" id="nameOverlay">
  <div class="card">
    <h3>처음 오셨네요 👋</h3>
    <p>캡처한 명함에 "누가 찍었는지"를 남기기 위해 이름이 필요해요. 한 번만 입력하면 기억합니다.</p>
    <div class="field"><input id="nameInput" placeholder="이름" autocomplete="name"></div>
    <button class="btn" id="nameSave" type="button">시작하기</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';
/* ── 설정 ── */
var DEFAULT_API = 'https://script.google.com/macros/s/AKfycbw1pWR3G6bj_S1gq5KT1PZJbEGvQGaxXnv8m4745-7wEJkIlHJCfwHJP-qLlBAmpw1tjw/exec';

var $ = function (id) { return document.getElementById(id); };
var store = {
  get: function (k) { try { return localStorage.getItem('cc_' + k); } catch (e) { return null; } },
  set: function (k, v) { try { localStorage.setItem('cc_' + k, v); } catch (e) {} }
};

/* URL 파라미터(?k=토큰&api=주소)를 저장해 두면 홈 화면 실행 때도 유지됩니다 */
(function initParams() {
  var p = new URLSearchParams(location.search);
  if (p.get('k')) store.set('token', p.get('k'));
  if (p.get('api')) store.set('api', p.get('api'));
})();
var TOKEN = store.get('token') || '';
var API = store.get('api') || (DEFAULT_API.indexOf('http') === 0 ? DEFAULT_API : '');

/* ── 상태 ── */
var front = null, back = null, flushing = false;
var targetMode = 'new';   /* 'new' = 새 캡처, 'edit' = 상세에서 다시 찍기 */
var edit = null;          /* 상세 화면 작업 사본 */

/* ── OpenCV 로딩 (명함 사각형 인식 엔진, 셀프호스팅) ── */
var CV = null, cvLoading = false;
function loadCv() {
  if (CV || cvLoading || !window.WebAssembly) return;
  cvLoading = true;
  var s = document.createElement('script');
  s.src = 'vendor/opencv.js';
  s.async = true;
  s.onload = function () {
    try {
      var mod = window.cv;
      if (mod && typeof mod.then === 'function') {
        mod.then(function (m) { CV = m; cvStatus(); });
      } else if (mod && mod.Mat) { CV = mod; cvStatus(); }
      else if (mod) { mod.onRuntimeInitialized = function () { CV = mod; cvStatus(); }; }
    } catch (e) { cvLoading = false; }
  };
  s.onerror = function () { cvLoading = false; };
  document.head.appendChild(s);
}
function cvStatus() {
  $('camCvSt').textContent = CV ? '자동 인식 켜짐' : (cvLoading ? '인식 엔진 준비 중…' : '');
}
setTimeout(loadCv, 2500);

/* ── 온보딩/헤더 ── */
function refreshChip() {
  var n = store.get('name');
  $('nameChip').textContent = n ? '👤 ' + n : '이름 설정';
}
$('nameChip').onclick = function () { $('nameOverlay').classList.add('show'); $('nameInput').value = store.get('name') || ''; };
$('nameSave').onclick = function () {
  var v = $('nameInput').value.trim();
  if (!v) return;
  store.set('name', v);
  $('nameOverlay').classList.remove('show');
  refreshChip();
};
function checkSetup() {
  var msg = '';
  if (!API) msg = 'index.html의 DEFAULT_API에 GAS 웹 앱 주소를 넣거나, 링크에 ?api=주소 를 붙여 한 번 열어주세요.';
  else if (!TOKEN) msg = '받으신 개인 링크(?k=토큰 포함)로 접속해 주세요. 토큰이 없으면 업로드가 거부됩니다.';
  $('setupBanner').style.display = msg ? '' : 'none';
  $('setupMsg').textContent = msg;
}

/* ── 공통: 캔버스/이미지 축소 ── */
function shrinkCanvas(srcCanvas, maxDim, q) {
  var w = srcCanvas.width, h = srcCanvas.height;
  var scale = Math.min(1, maxDim / Math.max(w, h));
  if (scale === 1) return srcCanvas.toDataURL('image/jpeg', q);
  var c = document.createElement('canvas');
  c.width = Math.round(w * scale); c.height = Math.round(h * scale);
  c.getContext('2d').drawImage(srcCanvas, 0, 0, c.width, c.height);
  return c.toDataURL('image/jpeg', q);
}
function fileToResized(file, maxDim, q) {
  return new Promise(function (resolve, reject) {
    var draw = function (bmp, w, h) {
      var scale = Math.min(1, maxDim / Math.max(w, h));
      var cw = Math.round(w * scale), ch = Math.round(h * scale);
      var c = document.createElement('canvas');
      c.width = cw; c.height = ch;
      c.getContext('2d').drawImage(bmp, 0, 0, cw, ch);
      resolve(c.toDataURL('image/jpeg', q));
    };
    if (window.createImageBitmap) {
      createImageBitmap(file, { imageOrientation: 'from-image' })
        .then(function (bmp) { draw(bmp, bmp.width, bmp.height); })
        .catch(function () { fallback(); });
    } else fallback();
    function fallback() {
      var url = URL.createObjectURL(file);
      var img = new Image();
      img.onload = function () { draw(img, img.naturalWidth, img.naturalHeight); URL.revokeObjectURL(url); };
      img.onerror = reject;
      img.src = url;
    }
  });
}
function b64of(dataUrl) { return dataUrl.slice(dataUrl.indexOf(',') + 1); }

/* ── 명함 사각형 인식 ── */
function orderQuad(pts) {
  var bySum = pts.slice().sort(function (a, b) { return (a.x + a.y) - (b.x + b.y); });
  var byDiff = pts.slice().sort(function (a, b) { return (a.y - a.x) - (b.y - b.x); });
  return [bySum[0], byDiff[0], bySum[3], byDiff[3]]; /* TL, TR, BR, BL */
}
function detectCardQuad(canvas, minAreaRatio) {
  if (!CV) return null;
  var src = null, gray = null, edges = null, kernel = null, contours = null, hier = null;
  try {
    src = CV.imread(canvas); gray = new CV.Mat();
    CV.cvtColor(src, gray, CV.COLOR_RGBA2GRAY);
    CV.GaussianBlur(gray, gray, new CV.Size(5, 5), 0);
    edges = new CV.Mat();
    CV.Canny(gray, edges, 40, 120);
    kernel = CV.getStructuringElement(CV.MORPH_RECT, new CV.Size(3, 3));
    CV.dilate(edges, edges, kernel);
    contours = new CV.MatVector(); hier = new CV.Mat();
    CV.findContours(edges, contours, hier, CV.RETR_LIST, CV.CHAIN_APPROX_SIMPLE);
    var W = canvas.width, H = canvas.height;
    var minA = (minAreaRatio || 0.1) * W * H, maxA = 0.96 * W * H;
    var best = null, bestA = 0;
    for (var i = 0; i < contours.size(); i++) {
      var c = contours.get(i);
      var peri = CV.arcLength(c, true);
      var approx = new CV.Mat();
      CV.approxPolyDP(c, approx, 0.03 * peri, true);
      if (approx.rows === 4 && CV.isContourConvex(approx)) {
        var a = CV.contourArea(approx);
        if (a > bestA && a > minA && a < maxA) {
          bestA = a;
          best = [];
          for (var j = 0; j < 4; j++) best.push({ x: approx.data32S[j * 2], y: approx.data32S[j * 2 + 1] });
        }
      }
      approx.delete(); c.delete();
    }
    return best ? orderQuad(best) : null;
  } catch (e) { return null; }
  finally {

    });

}
function qAll() {
  return db().then(function (d) {
    return new Promise(function (res, rej) {
      var r = d.transaction('q').objectStore('q').getAll();
      r.onsuccess = function () { res(r.result || []); };
      r.onerror = function () { rej(r.error); };
    });
  });
}

function newCaptureId() {
  var d = new Date(), p = function (n) { return String(n).padStart(2, '0'); };
  return d.getFullYear() + p(d.getMonth() + 1) + p(d.getDate()) + '-' +
    p(d.getHours()) + p(d.getMinutes()) + p(d.getSeconds()) + '-' +
    Math.random().toString(36).slice(2, 6);
}

function thumbOf(dataUrl) {
  return new Promise(function (resolve) {
    var img = new Image();
    img.onload = function () {
      var c = document.createElement('canvas');
      var s = 104 / Math.max(img.width, img.height);
      c.width = Math.round(img.width * s); c.height = Math.round(img.height * s);
      c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
      resolve(c.toDataURL('image/jpeg', 0.6));
    };
    img.src = dataUrl;
  });
}

$('sendBtn').onclick = function () {
  if (!front) return;
  var ev = $('eventInput').value.trim();
  var relSelf = $('relSelfInput').value.trim();
  var relKairen = $('relKairenInput').value.trim();
  var memo = $('noteInput').value.trim();
  store.set('event', ev);
  store.set('relSelf', relSelf);
  store.set('relKairen', relKairen);
  store.set('stickyAt', String(Date.now()));   /* 마지막 촬영 시각 — 2시간 유지의 기준 */
  /* 라벨 붙은 한 텍스트로 합쳐 전송 — 처리 파이프라인이 라벨로 구분 */
  var noteLines = [];
  if (relSelf) noteLines.push('나와의 관계: ' + relSelf);
  if (relKairen) noteLines.push('Kairen과의 관계: ' + relKairen);
  if (memo) noteLines.push('메모: ' + memo);
  var images = [{ name: 'front.jpg', mime: 'image/jpeg', dataB64: b64of(front) }];
  if (back) images.push({ name: 'back.jpg', mime: 'image/jpeg', dataB64: b64of(back) });
  var frontData = front;
  var item = {
    captureId: newCaptureId(),
    capturedAt: new Date().toISOString(),
    event: ev,
    relSelf: relSelf, relKairen: relKairen, memo: memo,
    note: noteLines.join('\n'),
    disp: memo || relSelf || relKairen,
    images: images,
    state: 'queued', tries: 0, thumb: ''
  };
  /* 즉시 초기화해서 다음 명함을 바로 찍을 수 있게 (만난 곳·관계 2개는 유지, 메모만 비움) */
  front = null; back = null;
  $('frontBtn').classList.remove('filled');
  $('frontBtn').innerHTML = '<span class="big">📷</span><span id="frontLabel">명함 앞면 촬영</span>';
  $('backBtn').style.display = 'none'; $('backBtn').classList.remove('filled');
  $('backBtn').innerHTML = '<span>뒷면 추가 <small>(선택)</small></span>';
  $('retakeBtn').style.display = 'none';
  $('noteInput').value = '';
  $('sendBtn').disabled = true;

  thumbOf(frontData).then(function (t) {
    item.thumb = t;
    return qPut(item);
  }).then(function () {
    renderRecent();
    toastMsg('대기열에 저장했어요. 업로드 시작!');
    flush();
  });
};

/* ── 업로드 ── */
function sendItem(item) {
  var payload = {
    k: TOKEN, captureId: item.captureId, capturedAt: item.capturedAt,
    capturer: store.get('name') || '', event: item.event, note: item.note, images: item.images
  };
  return fetch(API, { method: 'POST', body: JSON.stringify(payload) })
    .then(function (r) { return r.json(); })
    .then(function (res) {
      if (!res.ok) throw new Error(res.error || 'upload_failed');
      item.state = 'sent';
      /* 사진 원본을 보관해 상세 화면에서 다시 찍기·재전송이 가능하게 한다 (오래된 항목은 정리됨) */
      return qPut(item);
    });
}
function flush() {
  if (flushing || !API || !TOKEN) return;
  flushing = true;
  qAll().then(function (items) {
    var pending = items.filter(function (i) { return i.state !== 'sent'; })
      .sort(function (a, b) { return a.captureId < b.captureId ? -1 : 1; });
    var chain = Promise.resolve();
    pending.forEach(function (item) {
      chain = chain.then(function () {
        return sendItem(item).then(function () { renderRecent(); })
          .catch(function (e) {
            item.state = 'failed'; item.tries = (item.tries || 0) + 1; item.err = String(e.message || e);
            return qPut(item).then(renderRecent);
          });
      });
    });
    return chain;
  }).then(function () { flushing = false; })
    .catch(function () { flushing = false; });
}

/* ── 최근 목록 ── */
function renderRecent() {
  qAll().then(function (items) {
    items.sort(function (a, b) { return a.captureId < b.captureId ? 1 : -1; });
    var el = $('recentList');
    if (!items.length) {
      el.innerHTML = '<p class="hint" style="margin:6px 0">아직 캡처가 없어요.</p>';
      return;
    }
    el.innerHTML = '';
    var names = briefNameMap();
    items.slice(0, 30).forEach(function (i) {
      var div = document.createElement('div');
      div.className = 'item';
      var stCls = i.state === 'sent' ? 'sent' : (i.state === 'failed' ? 'failed' : 'queued');
      var stTxt = i.state === 'sent' ? '전송됨' : (i.state === 'failed' ? '재시도' : '대기 중');
      div.innerHTML =
        '<img alt="">' +
        '<div class="info"><div class="t1"></div><div class="t2"></div></div>' +
        '<span class="st ' + stCls + '">' + stTxt + '</span>';
      if (i.thumb) div.querySelector('img').src = i.thumb;
      /* 표시: 이름(처리 후 브리핑에서) / 어디서 · Kairen 관계 · 나와의 관계 — 메모는 표시하지 않음 */
      var rel = { relSelf: i.relSelf, relKairen: i.relKairen };
      if (rel.relSelf === undefined) { var p2 = parseNoteLegacy(i.note); rel.relSelf = p2.relSelf; rel.relKairen = p2.relKairen; }
      div.querySelector('.t1').textContent = names[i.captureId] || '이름 인식 대기';
      var parts = [];
      if (i.event) parts.push(i.event);
      if (rel.relKairen) parts.push('Kairen: ' + rel.relKairen);
      if (rel.relSelf) parts.push('나: ' + rel.relSelf);
      div.querySelector('.t2').textContent = parts.join(' · ') || i.captureId.slice(4, 8);
      div.style.cursor = 'pointer';
      div.onclick = function () { openDetail(i); };
      if (i.state === 'failed') div.querySelector('.st').onclick = function (ev2) { ev2.stopPropagation(); i.state = 'queued'; qPut(i).then(function () { renderRecent(); flush(); }); };
      el.appendChild(div);
    });
  });
}

/* ── 받은 명함 브리핑 ── */
function mdLite(text) {
  var root = document.createElement('div');
  String(text || '').split('\n').forEach(function (ln) {
    ln = ln.replace(/\[\[([^\]|]+)(\|[^\]]+)?\]\]/g, '$1').replace(/\*\*/g, '');
    var d = document.createElement('div');
    if (ln.indexOf('# ') === 0) { d.style.cssText = 'font-weight:700;font-size:15px;margin:8px 0 4px'; d.textContent = ln.slice(2); }
    else if (ln.indexOf('## ') === 0) { d.style.cssText = 'font-weight:600;font-size:13.5px;margin:8px 0 3px'; d.textContent = ln.slice(3); }
    else if (ln.indexOf('- ') === 0) { d.style.cssText = 'font-size:13px;color:var(--muted);margin:2px 0 2px 8px'; d.textContent = '• ' + ln.slice(2); }
    else if (ln.indexOf('→') === 0) { d.style.cssText = 'font-size:13px;margin-top:6px'; d.textContent = ln; }
    else if (!ln.trim()) { d.style.height = '4px'; }
    else { d.style.cssText = 'font-size:13.5px;line-height:1.55'; d.textContent = ln; }
    root.appendChild(d);
  });
  return root;
}
var briefSeeAll = false;
var briefExpanded = {};   /* captureId → true, 자동 새로고침에도 펼침 상태 유지 */
var lastBriefsJson = '';
function nameFromBrief(brief) {
  if (!brief) return null;
  var first = String(brief).split('\n')[0];
  if (first.indexOf('# ') !== 0) return null;
  return first.slice(2).split('—')[0].trim() || null;
}
function briefNameMap() {
  var map = {};
  try {
    (JSON.parse(store.get('briefs') || '[]') || []).forEach(function (b) {
      var n = nameFromBrief(b.brief);
      if (n) map[b.captureId] = n;
    });
  } catch (e) {}
  return map;
}
function renderBriefs(items) {
  var el = $('briefList');
  el.innerHTML = '';
  if (!items || !items.length) {
    el.innerHTML = '<p class="hint" style="margin:6px 0">아직 도착한 브리핑이 없어요. 명함을 찍으면 시스템이 처리 후 여기로 알려드려요.</p>';
    return;
  }
  items.forEach(function (it) {
    var wrap = document.createElement('div');
    wrap.className = 'item';
    wrap.style.cssText = 'flex-direction:column;align-items:stretch;cursor:pointer';
    var stTxt = it.status === 'processed' ? '브리핑 도착' : (it.status === 'skipped' ? '건너뜀' : '처리 대기 중');
    var stCls = it.status === 'processed' ? 'sent' : (it.status === 'skipped' ? 'failed' : 'queued');
    var title = (it.brief && it.brief.indexOf('# ') === 0) ? it.brief.split('\n')[0].slice(2) : (it.event || it.captureId);
    var when = String(it.captureId).slice(4, 6) + '/' + String(it.captureId).slice(6, 8);
    var head = document.createElement('div');
    head.style.cssText = 'display:flex;justify-content:space-between;align-items:center;gap:8px';
    head.innerHTML = '<div class="t1" style="font-weight:600"></div><span class="st ' + stCls + '"></span>';
    head.querySelector('.t1').textContent = title;
    head.querySelector('.st').textContent = stTxt;
    var sub = document.createElement('div');
    sub.className = 't2';
    sub.textContent = when + (it.event ? ' · ' + it.event : '') + (it.capturer ? ' · 촬영: ' + it.capturer : '');
    var body = document.createElement('div');
    body.style.display = briefExpanded[it.captureId] ? '' : 'none';
    if (it.brief) body.appendChild(mdLite(it.brief.split('\n').slice(1).join('\n')));
    if (it.person && briefSeeAll) {
      var docBtn = document.createElement('button');
      docBtn.className = 'chip';
      docBtn.style.cssText = 'margin-top:8px;align-self:flex-start';
      docBtn.textContent = '전체 프로필(.md) 보기 — ' + it.person;
      docBtn.onclick = function (ev2) { ev2.stopPropagation(); openPersonDoc(it); };
      body.appendChild(docBtn);
    }
    wrap.appendChild(head); wrap.appendChild(sub); wrap.appendChild(body);
    wrap.onclick = function () {
      var open = body.style.display === 'none';
      body.style.display = open ? '' : 'none';
      briefExpanded[it.captureId] = open;
    };
    el.appendChild(wrap);
  });
}
/* Person .md 뷰어: 프런트매터는 회색 블록, 본문은 mdLite, 이미지 embed는 라벨로 */
function renderPersonMd(md) {
  var root = document.createElement('div');
  var text = String(md || '');
  var body = text;
  if (text.indexOf('---') === 0) {
    var end = text.indexOf('\n---', 3);
    if (end > 0) {
      var fm = text.slice(4, end);
      body = text.slice(end + 4);
      var fmBox = document.createElement('div');
      fmBox.style.cssText = 'background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:11.5px;color:var(--muted);white-space:pre-wrap;word-break:break-all;max-height:180px;overflow-y:auto';
      fmBox.textContent = fm.trim();
      root.appendChild(fmBox);
    }
  }
  body = body.replace(/!\[\[([^\]]+)\]\]/g, '(이미지: $1)');
  root.appendChild(mdLite(body));
  return root;
}
function openPersonDoc(it) {
  $('docTitle').textContent = it.person;
  $('docBody').innerHTML = '<p class="hint">프로필 불러오는 중…</p>';
  $('docOverlay').classList.add('show');
  fetch(API + '?action=persondoc&k=' + encodeURIComponent(TOKEN) + '&captureId=' + encodeURIComponent(it.captureId))
    .then(function (r) { return r.json(); })
    .then(function (res) {
      $('docBody').innerHTML = '';
      if (!res.ok) {
        $('docBody').innerHTML = '<p class="hint">불러오지 못했어요: ' + (res.error === 'owner_only' ? '소유자 토큰만 볼 수 있어요' : (res.error === 'unknown_action' ? '서버 업데이트(GAS 재배포) 후 열려요' : res.error)) + '</p>';
        return;
      }
      $('docBody').appendChild(renderPersonMd(res.markdown));
    })
    .catch(function () { $('docBody').innerHTML = '<p class="hint">네트워크 오류 — 다시 시도해 주세요</p>'; });
}
$('docClose').onclick = function () { $('docOverlay').classList.remove('show'); };
function loadBriefs(manual) {
  if (!API || !TOKEN) return;
  briefSeeAll = store.get('briefSeeAll') === '1';
  var cached = store.get('briefs');
  if (cached && !manual) { try { renderBriefs(JSON.parse(cached)); } catch (e) {} }
  fetch(API + '?action=list&k=' + encodeURIComponent(TOKEN))
    .then(function (r) { return r.json(); })
    .then(function (res) {
      if (!res.ok) {
        if (res.error === 'unknown_action') $('briefList').innerHTML = '<p class="hint" style="margin:6px 0">브리핑 기능은 서버 업데이트(GAS 재배포) 후 열려요.</p>';
        return;
      }
      briefSeeAll = !!res.seeAll;
      store.set('briefSeeAll', briefSeeAll ? '1' : '');
      var json = JSON.stringify(res.items);
      if (json === lastBriefsJson && !manual) return; /* 변화 없으면 다시 그리지 않음 — 펼쳐 읽는 중 방해 금지 */
      lastBriefsJson = json;
      store.set('briefs', json);
      renderBriefs(res.items);
      renderRecent(); /* 처리 완료로 이름이 생겼을 수 있으니 최근 캡처도 갱신 */
    })
    .catch(function () { if (manual) toastMsg('브리핑을 불러오지 못했어요 — 네트워크 확인'); });
}
$('briefRefresh').onclick = function () { toastMsg('브리핑 새로고침 중…'); loadBriefs(true); };
/* 자동 새로고침: 화면이 보이는 동안 20초마다 + 앱으로 돌아올 때마다 */
setInterval(function () { if (!document.hidden) loadBriefs(); }, 20000);
window.addEventListener('focus', function () { loadBriefs(); });

/* ── 토스트/이벤트 ── */
var toastTimer = null;
function toastMsg(m) {
  var t = $('toast');
  t.textContent = m; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function () { t.classList.remove('show'); }, 2200);
}
window.addEventListener('online', flush);
document.addEventListener('visibilitychange', function () { if (!document.hidden) { flush(); loadBriefs(); applySticky(); } });

/* ── 저장 공간 정리: 최신 50개 이후의 전송 완료 캡처는 사진 원본을 비운다 ── */
function pruneOld() {
  qAll().then(function (items) {
    items.sort(function (a, b) { return a.captureId < b.captureId ? 1 : -1; });
    items.slice(50).forEach(function (i) {
      if (i.state === 'sent' && (i.images || []).some(function (im) { return im.dataB64; })) {
        i.images = i.images.map(function (im) { return { name: im.name }; });
        qPut(i);
      }
    });
  });
}

/* ── 시작 ── */
/* 유지 필드는 마지막 촬영 후 2시간까지만 — 지나면 자동으로 비움 */
function applySticky() {
  var at = parseInt(store.get('stickyAt') || '0', 10) || 0;
  if (at && Date.now() - at > 2 * 60 * 60 * 1000) {
    store.set('event', ''); store.set('relSelf', ''); store.set('relKairen', ''); store.set('stickyAt', '');
    $('eventInput').value = ''; $('relSelfInput').value = ''; $('relKairenInput').value = '';
    return;
  }
  /* 입력 중인 값은 건드리지 않고 빈 칸만 복원 */
  if (!$('eventInput').value) $('eventInput').value = store.get('event') || '';
  if (!$('relSelfInput').value) $('relSelfInput').value = store.get('relSelf') || '';
  if (!$('relKairenInput').value) $('relKairenInput').value = store.get('relKairen') || '';
}
applySticky();
refreshChip();
checkSetup();
renderRecent();
flush();
pruneOld();
loadBriefs();
if (!store.get('name')) $('nameOverlay').classList.add('show');
if ('serviceWorker' in navigator && location.protocol === 'https:') {
  navigator.serviceWorker.register('sw.js').catch(function () {});
}
</script>
